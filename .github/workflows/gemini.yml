name: Gemini Assistant

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  gemini:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@gemini-cli')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.21
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |
            {
              "trustedFolders": ["/"],
              "skipTrust": true
            }
          prompt: |
